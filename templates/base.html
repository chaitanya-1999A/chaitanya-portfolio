<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ owner.name }} | Portfolio{% endblock %}</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Main stylesheet via url_for so Flask serves from /static/ -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ======================== NAVBAR ======================== -->
  <nav class="navbar">
    <div class="nav-container">

      <!-- Brand / logo -->
      <a href="{{ url_for('index') }}" class="nav-logo">{{ owner.name }}</a>

      <!-- Hamburger (hidden on desktop, visible on mobile) -->
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>

      <!-- Nav links — request.endpoint identifies the active page -->
      <ul class="nav-links" id="navLinks">
        <li>
          <a href="{{ url_for('index') }}"
             class="{{ 'active' if request.endpoint == 'index' else '' }}">Home</a>
        </li>
        <li>
          <a href="{{ url_for('about') }}"
             class="{{ 'active' if request.endpoint == 'about' else '' }}">About</a>
        </li>
        <li>
          <a href="{{ url_for('contact') }}"
             class="{{ 'active' if request.endpoint == 'contact' else '' }}">Contact</a>
        </li>
      </ul>

    </div>
  </nav>
  <!-- ===================== END NAVBAR ===================== -->

  <!-- Page content injected by child templates -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ======================== FOOTER ======================== -->
  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2025 {{ owner.name }}. Built with Python &amp; Flask.</p>
      <div class="footer-links">
        <a href="{{ social.github }}"   target="_blank" rel="noopener">GitHub</a>
        <a href="{{ social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:{{ owner.email }}">Email</a>
      </div>
    </div>
  </footer>
  <!-- ===================== END FOOTER ===================== -->

  <!-- Mobile nav toggle -->
  <script>
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      links.classList.toggle('open');
      toggle.classList.toggle('open');
    });
    // Close menu when a link is tapped (better UX on mobile)
    links.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        links.classList.remove('open');
        toggle.classList.remove('open');
      });
    });
  </script>

</body>
</html>
